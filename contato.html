  <div class="container mt-3">
    <h3>Contato</h3>
    <form class="row g-3">
      <div class="col-md-7 col-sm-12">
        <div class="form-floating">
          <input type="text" name="nome" id="nome" class="form-control" placeholder="Nome do Produto" required>
          <label for="nome">Nome do Produto</label>
        </div>
      </div>

      <div class="col-md-5 col-sm-12">
        <div class="form-floating">
          <input type="number" name="valor" id="valor" class="form-control" placeholder="Valor" step="0.5" required>
          <label for="valor">Valor</label>
        </div>
      </div>

      <div class="col-md-4 col-sm-12">
        <div class="form-floating">
          <input type="number" name="quantidade" id="quantidade" class="form-control" placeholder="Quantidade" required>
          <label for="quantidade">Quantidade</label>
        </div>
      </div>

      <div class="col-md-4 col-sm-12">
        <div class="form-floating">
          <input type="date" name="data" id="data" class="form-control">
          <label for="data">Data de Validade</label>
        </div>
      </div>

      <div class="col-md-4 col-sm-12">
        <div class="form-floating">
          <select name="categoria" id="categoria" class="form-select" required>
            <option value="" selected disabled>Selecione</option>
            <option value="normal">Normal</option>
            <option value="zero">Zero</option>
          </select>
          <label for="categoria">Categoria</label>
        </div>
      </div>
      <div class="col-md-4 col-sm-12">
        <label class="form-label d-block">Fabricado em:</label>
        <div class="form-check form-check-inline">
          <input type="radio" name="estado" id="sp" class="form-check-input">
          <label for="sp" class="form-check-label">SP</label>
        </div>
        <div class="form-check form-check-inline">
          <input type="radio" name="estado" id="rj" class="form-check-input">
          <label for="rj" class="form-check-label">RJ</label>
        </div>
        <div class="form-check form-check-inline">
          <input type="radio" name="estado" id="mg" class="form-check-input">
          <label for="mg" class="form-check-label">MG</label>
        </div>
      </div>
      <div class="col-md-12 col-sm-12">
        <div class="form-check">
          <input type="checkbox" name="termos" id="termos" class="form-check-input" required>
          <label for="termos" class="form-check-label">Aceite os termos</label>
        </div>
      </div>

      <div class="col-12 mb-4">
        <button type="submit" class="btn btn-success">Enviar</button>
        <button type="reset" class="btn btn-warning">Limpar</button>
        <button type="button" class="btn btn-danger">Cancelar</button>

      </div>
    </form>
  </div>
