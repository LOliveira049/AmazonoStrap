<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="bi bi-amazon"></i></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contato.html">Contato</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sobre.html">Sobre</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
        <div class="row">
            <div class="col-md-4 col-sm-12">
                <div class="alert alert-dark" role="alert">
                    A simple dark alert—check it out!
                </div>
            </div>
            <div class="col-md-4 col-sm-12">
                <div class="alert alert-success" role="alert">
                    A simple dark alert—check it out!
                </div>
            </div>
            <div class="col-md-4 col-sm-12">
                <div class="alert alert-danger" role="alert">
                    A simple dark alert—check it out!
                </div>
            </div>
        </div>

        <h2 class="mb-3 mt-1">Nossos Produtos</h2>
        <div class="row">
            <div class="col-md-6 col-sm-12 mb-5">
                <div class="card h-100">
                    <img src="img/Coca.png" class="card-img-top" alt="Coca2L" style="width: 50%;">
                    <div class="card-body">
                        <h5 class="card-title">Coca Cola</h5>
                        <p class="card-text">
                            Coca Cola 2L
                        </p>
                        <a href="coca.html" class="btn btn-dark">Comprar</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-sm-12 mb-5">
                <div class="card h-100">
                    <img src="img/CocaZ.png" class="card-img-top" alt="Coca2L" style="width: 50%;">
                    <div class="card-body">
                        <h5 class="card-title">Coca Cola Zero</h5>
                        <p class="card-text">
                            Coca Cola Zero 2L
                        </p>
                        <a href="coca.html" class="btn btn-dark">Comprar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
