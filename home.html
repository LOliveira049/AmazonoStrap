<!-- HTML -->
<img src="img/vasco.png" class="girar" alt="Imagem Girando">

<!-- CSS -->
<style>
.girar {
  width: 32%; /* Tamanho da imagem */
  animation: rotacao 1s linear infinite; /* Nome, Tempo, Velocidade, Repetição */
}

@keyframes rotacao {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}
</style>
